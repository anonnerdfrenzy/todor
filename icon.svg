<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c73050"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="40" y="40" width="944" height="944" rx="200" ry="200" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Checklist lines -->
  <!-- Item 1 - checked -->
  <rect x="220" y="250" width="80" height="80" rx="16" fill="none" stroke="white" stroke-width="12"/>
  <polyline points="238,292 262,318 310,262" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="360" y="270" width="420" height="40" rx="12" fill="white" opacity="0.9"/>

  <!-- Item 2 - checked -->
  <rect x="220" y="420" width="80" height="80" rx="16" fill="none" stroke="white" stroke-width="12"/>
  <polyline points="238,462 262,488 310,432" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="360" y="440" width="340" height="40" rx="12" fill="white" opacity="0.9"/>

  <!-- Item 3 - unchecked (active) -->
  <rect x="220" y="590" width="80" height="80" rx="16" fill="none" stroke="white" stroke-width="12"/>
  <rect x="360" y="610" width="380" height="40" rx="12" fill="white" opacity="0.5"/>

  <!-- Item 4 - unchecked (active) -->
  <rect x="220" y="720" width="80" height="80" rx="16" fill="none" stroke="white" stroke-width="12"/>
  <rect x="360" y="740" width="280" height="40" rx="12" fill="white" opacity="0.5"/>
</svg>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Todor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      -webkit-app-region: drag;
      height: 38px;
      background: #16213e;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 12px;
    }

    #pomo-badge {
      -webkit-app-region: no-drag;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s;
    }
    #pomo-badge.focus {
      background: rgba(0, 153, 0, 0.18);
      color: #4ad94a;
      border: 1px solid rgba(0, 153, 0, 0.4);
    }
    #pomo-badge.breakp {
      background: rgba(245, 197, 66, 0.15);
      color: #f5c542;
      border: 1px solid rgba(245, 197, 66, 0.4);
    }
    #pomo-badge.single {
      background: rgba(26, 74, 138, 0.35);
      color: #7db2ff;
      border: 1px solid rgba(26, 74, 138, 0.7);
    }
    #pomo-badge:hover { opacity: 0.8; }

    .tabs {
      display: flex;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 10px 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #667;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab:hover { color: #aab; }

    .tab.active {
      color: #009900;
      border-bottom-color: #009900;
    }

    #tab-active.active {
      color: #e94560;
      border-bottom-color: #e94560;
    }

    .tab .count {
      display: inline-block;
      background: #0f3460;
      color: #8899aa;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 6px;
    }

    .tab.active .count {
      background: #009900;
      color: white;
    }

    #tab-active.active .count {
      background: #e94560;
    }

    .container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .add-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      flex-shrink: 0;
    }

    .add-bar input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }

    .add-bar input:focus { border-color: #009900; }

    .add-bar button {
      background: #009900;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .add-bar button:hover { background: #007700; }

    .todo-item {
      margin-bottom: 2px;
    }

    .todo-item.drag-over-above { border-top: 2px solid #009900; }
    .todo-item.drag-over-below { border-bottom: 2px solid #009900; }
    .todo-item.dragging { opacity: 0.3; }

    .drag-handle {
      width: 14px;
      font-size: 11px;
      color: #334;
      cursor: grab;
      text-align: center;
      flex-shrink: 0;
      user-select: none;
      line-height: 1;
    }

    .drag-handle:hover { color: #889; }
    .drag-handle:active { cursor: grabbing; }

    .todo-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .todo-row:hover { background: #16213e; }
    .todo-row:hover .drag-handle { color: #667; }

    .todo-row.selected { background: #0f3460; outline: 1px solid #1a4a8a; }

    .todo-row.completed .todo-text {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid #0f3460;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .checkbox.checked {
      background: #009900;
      border-color: #009900;
    }

    .checkbox.checked::after {
      content: "";
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .checkbox.readonly {
      cursor: default;
      opacity: 0.6;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
    }

    .todo-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .todo-row:hover .todo-actions { opacity: 1; }

    .todo-actions button {
      background: none;
      border: none;
      color: #667;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .todo-actions button:hover { background: #0f3460; color: #e0e0e0; }

    .expand-arrow {
      width: 16px;
      font-size: 10px;
      color: #667;
      cursor: pointer;
      text-align: center;
      flex-shrink: 0;
      user-select: none;
    }

    .today-star {
      width: 18px;
      flex-shrink: 0;
      font-size: 14px;
      color: #445;
      cursor: pointer;
      text-align: center;
      user-select: none;
      transition: color 0.15s, transform 0.15s;
    }
    .today-star:hover { color: #f5c542; transform: scale(1.15); }
    .today-star.on { color: #f5c542; }

    .todo-row.ancestor { cursor: default; opacity: 0.45; }
    .todo-row.ancestor:hover { background: transparent; }
    .todo-row.ancestor .todo-text { color: #778; font-style: italic; }

    .section-header {
      margin: 12px 4px 6px 4px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #667;
      border-bottom: 1px solid #0f3460;
    }
    .section-header.today { color: #f5c542; }

    #palette-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 9999;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 80px;
    }
    #palette {
      width: 520px;
      max-width: 90vw;
      background: #16213e;
      border: 1px solid #1a4a8a;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    #paletteInput {
      width: 100%;
      background: #0f3460;
      border: none;
      outline: none;
      padding: 12px 14px;
      font-size: 14px;
      color: #e0e0e0;
      border-bottom: 1px solid #1a4a8a;
    }
    #paletteList {
      max-height: 420px;
      overflow-y: auto;
    }
    .palette-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      font-size: 13px;
      color: #ccd;
      cursor: pointer;
      border-bottom: 1px solid #0f3460;
    }
    .palette-item:last-child { border-bottom: none; }
    .palette-item.selected { background: #0f3460; color: #fff; }
    .palette-item.disabled { color: #556; cursor: default; }
    .palette-shortcut {
      font-family: -apple-system, monospace;
      font-size: 11px;
      color: #889;
      background: #0f3460;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .palette-item.selected .palette-shortcut { background: #1a4a8a; color: #e0e0e0; }

    .children {
      margin-left: 26px;
      border-left: 1px solid #0f3460;
      padding-left: 8px;
    }

    .notes-area {
      margin: 4px 0 4px 42px;
      padding: 8px;
      background: #16213e;
      border-radius: 6px;
      border: 1px solid #0f3460;
    }

    .notes-area textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: #c0c0c0;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      min-height: 40px;
      outline: none;
    }

    .notes-display {
      margin: 4px 0 4px 42px;
      padding: 8px;
      background: #16213e;
      border-radius: 6px;
      border: 1px solid #0f3460;
      color: #889;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .completed-date {
      font-size: 11px;
      color: #556;
      margin-left: auto;
      flex-shrink: 0;
    }

    .due-date {
      font-size: 11px;
      color: #667;
      flex-shrink: 0;
      margin-left: auto;
      padding: 1px 6px;
      border-radius: 4px;
    }

    .due-date.overdue { color: #e94560; font-weight: 600; }
    .due-date.today { color: #f0a030; font-weight: 600; }
    .due-date.soon { color: #d0d050; }

    .due-input-row {
      display: flex;
      gap: 6px;
      margin: 4px 0 4px 42px;
    }

    .due-input-row input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 4px 8px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }

    .due-input-row button {
      background: #0f3460;
      color: #c0c0c0;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .sub-add {
      display: flex;
      gap: 6px;
      margin: 4px 0 4px 34px;
    }

    .sub-add input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 4px 8px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }

    .sub-add button {
      background: #0f3460;
      color: #c0c0c0;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      color: #445;
      margin-top: 80px;
      font-size: 15px;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
      padding: 8px 16px 0;
    }

    .view-toggle button {
      background: none;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #667;
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
    }

    .view-toggle button.active {
      background: #0f3460;
      color: #c0d0e0;
    }

    .parent-label {
      font-size: 11px;
      color: #556;
      margin-left: 42px;
      padding: 1px 0;
      font-style: italic;
    }

    .pomo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 24px;
    }

    .pomo-time {
      font-size: 72px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      color: #e0e0e0;
      letter-spacing: 2px;
    }

    .pomo-time.running { color: #009900; }

    .pomo-presets {
      display: flex;
      gap: 10px;
    }

    .pomo-presets button {
      background: #0f3460;
      color: #8899aa;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .pomo-presets button:hover { background: #1a4a8a; color: #e0e0e0; }
    .pomo-presets button.selected { background: #009900; color: white; }

    .pomo-controls {
      display: flex;
      gap: 12px;
    }

    .pomo-controls button {
      background: #16213e;
      color: #8899aa;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .pomo-controls button:hover { background: #0f3460; color: #e0e0e0; }

    .pomo-controls button.primary {
      background: #009900;
      color: white;
      border-color: #009900;
    }

    .pomo-controls button.primary:hover { background: #007700; }

    .pomo-mode-toggle {
      display: flex;
      gap: 4px;
      background: #0f3460;
      border-radius: 8px;
      padding: 3px;
    }
    .pomo-mode-toggle button {
      background: transparent;
      border: none;
      color: #8899aa;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pomo-mode-toggle button:hover { color: #e0e0e0; }
    .pomo-mode-toggle button.selected {
      background: #1a4a8a;
      color: white;
    }

    .pomo-phase {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .pomo-phase.focus { color: #009900; }
    .pomo-phase.breakp { color: #f5c542; }

    .pomo-cyclecount {
      font-size: 13px;
      color: #667;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <div id="pomo-badge" onclick="switchTab('pomodoro')" title="Pomodoro"></div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-active" onclick="switchTab('active')">Active <span class="count" id="count-active">0</span></div>
    <div class="tab" id="tab-completed" onclick="switchTab('completed')">Completed <span class="count" id="count-completed">0</span></div>
    <div class="tab" id="tab-pomodoro" onclick="switchTab('pomodoro')">Pomodoro</div>
  </div>
  <div class="container" id="list"></div>
  <div class="add-bar" id="add-bar">
    <input type="text" id="newTodo" placeholder="Add a todo..." autofocus>
    <button onclick="addTodo()">Add</button>
  </div>

  <div id="palette-overlay" style="display:none;" onclick="if(event.target===this)closePalette()">
    <div id="palette">
      <input type="text" id="paletteInput" placeholder="Search commands..." autocomplete="off" oninput="paletteIdx=0;renderPalette()">
      <div id="paletteList"></div>
    </div>
  </div>

  <script>
    const fs = require('fs');
    const path = require('path');
    const { ipcRenderer } = require('electron');

    const DATA_FILE = path.join(__dirname, 'todos.json');
    const COMPLETED_FILE = path.join(__dirname, 'completed.json');
    let todos = [];
    let completed = [];
    let expandedIds = new Set();
    let notesOpenIds = new Set();
    let currentTab = 'active';
    let selectedPath = null; // dot-path string of selected todo, null = none
    let todayOnlyMode = false;

    // Pomodoro timer state
    let pomoSeconds = 10 * 60; // default 10 min (single-timer mode)
    let pomoRemaining = 0;
    let pomoRunning = false;
    let pomoInterval = null;
    let pomoPreset = 10;

    // Cycle-mode state
    let pomoMode = 'cycle'; // 'single' | 'cycle'
    let pomoFocusSeconds = 25 * 60;
    let pomoBreakSeconds = 5 * 60;
    let pomoFocusInputVal = '25m';
    let pomoBreakInputVal = '5m';
    let pomoPhase = 'focus'; // 'focus' | 'break' (only meaningful in cycle mode)
    let pomoCycleCount = 0;  // completed focus sessions in current run

    function load() {
      try { todos = JSON.parse(fs.readFileSync(DATA_FILE, 'utf-8')); } catch { todos = []; }
      try { completed = JSON.parse(fs.readFileSync(COMPLETED_FILE, 'utf-8')); } catch { completed = []; }
    }

    function save() {
      fs.writeFileSync(DATA_FILE, JSON.stringify(todos, null, 2));
      fs.writeFileSync(COMPLETED_FILE, JSON.stringify(completed, null, 2));
    }

    function saveTodos() {
      fs.writeFileSync(DATA_FILE, JSON.stringify(todos, null, 2));
    }

    function saveCompleted() {
      fs.writeFileSync(COMPLETED_FILE, JSON.stringify(completed, null, 2));
    }

    function genId() {
      return Math.random().toString(36).substr(2, 8);
    }

    // Build ordered list of visible paths (respects expand state)
    function getVisiblePaths() {
      const paths = [];
      function walk(items, prefix) {
        items.forEach((item, i) => {
          const p = prefix.length ? prefix + '.' + i : '' + i;
          if (todayOnlyMode) {
            if (typeof hasTodayDescendant !== 'function' || !hasTodayDescendant(item)) return;
            if (item.today) paths.push({ path: p, id: item.id });
            if (item.children && item.children.length > 0) {
              walk(item.children, p); // always descend in today mode
            }
          } else {
            paths.push({ path: p, id: item.id });
            if (item.children && item.children.length > 0 && expandedIds.has(item.id)) {
              walk(item.children, p);
            }
          }
        });
      }
      walk(todos, '');
      return paths;
    }

    function switchTab(tab) {
      currentTab = tab;
      selectedPath = null;
      document.getElementById('tab-active').classList.toggle('active', tab === 'active');
      document.getElementById('tab-completed').classList.toggle('active', tab === 'completed');
      document.getElementById('tab-pomodoro').classList.toggle('active', tab === 'pomodoro');
      document.getElementById('add-bar').style.display = tab === 'active' ? 'flex' : 'none';
      render();
    }

    function fmtTime(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      if (h > 0) {
        return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function menuBarText() {
      let taskText = null;
      if (selectedPath !== null && currentTab === 'active') {
        try { taskText = getByPath(selectedPath).node.text; } catch {}
      }
      if (pomoRunning) {
        const time = fmtTime(pomoRemaining);
        if (pomoMode === 'cycle') {
          if (pomoPhase === 'break') {
            return 'Break \u2014 ' + time;
          }
          // focus phase
          if (taskText) return taskText + ' \u2014 ' + time;
          return 'Focus \u2014 ' + time;
        }
        // single mode
        if (taskText) return taskText + ' \u2014 ' + time;
        return 'Pomodoro \u2014 ' + time;
      }
      return taskText;
    }

    function render() {
      const list = document.getElementById('list');
      document.getElementById('count-active').textContent = todos.length;
      document.getElementById('count-completed').textContent = completed.length;

      if (currentTab === 'active') {
        if (todos.length === 0) {
          list.innerHTML = '<div class="empty">No todos yet</div>';
        } else {
          let html = '';
          if (todayOnlyMode) {
            const hasAnyToday = todos.some(hasTodayDescendant);
            html += '<div class="section-header today">Today only (\u2318\u21E7T to show all)</div>';
            if (hasAnyToday) {
              html += renderActiveItems(todos, [], 'today');
            } else {
              html += '<div class="empty">Nothing flagged for today</div>';
            }
          } else {
            html += renderActiveItems(todos, [], 'all');
          }
          list.innerHTML = html;
        }
      } else if (currentTab === 'completed') {
        if (completed.length === 0) {
          list.innerHTML = '<div class="empty">No completed todos yet</div>';
        } else {
          const toggle = '<div class="view-toggle">' +
            '<button class="' + (completedViewMode === 'date' ? 'active' : '') + '" onclick="setCompletedView(\'date\')">By date</button>' +
            '<button class="' + (completedViewMode === 'tree' ? 'active' : '') + '" onclick="setCompletedView(\'tree\')">By tree</button>' +
            '</div>';
          if (completedViewMode === 'date') {
            list.innerHTML = toggle + renderCompletedItems(completed);
          } else {
            list.innerHTML = toggle + renderCompletedByTree(completed);
          }
        }
      } else if (currentTab === 'pomodoro') {
        list.innerHTML = renderPomoTab();
      }

      // Scroll selected into view
      if (selectedPath !== null) {
        const sel = document.querySelector('.todo-row.selected');
        if (sel) sel.scrollIntoView({ block: 'nearest' });
      }

      // Write selection to file for menu bar app
      fs.writeFileSync(path.join(__dirname, 'selection.json'), JSON.stringify({ text: menuBarText() }));
      updatePomoBadge();
    }

    function renderPomoTab() {
      let html = '<div class="pomo-container">';

      // Mode toggle
      html += '<div class="pomo-mode-toggle">';
      html += '<button class="' + (pomoMode === 'single' ? 'selected' : '') + '" onclick="setPomoMode(\'single\')">Single</button>';
      html += '<button class="' + (pomoMode === 'cycle' ? 'selected' : '') + '" onclick="setPomoMode(\'cycle\')">Cycle</button>';
      html += '</div>';

      if (pomoMode === 'cycle') {
        // Phase label
        const phaseLabel = pomoPhase === 'focus' ? 'Focus' : 'Break';
        const phaseClass = pomoPhase === 'focus' ? 'focus' : 'breakp';
        html += '<div class="pomo-phase ' + phaseClass + '">' + phaseLabel + '</div>';
        // Display time
        const display = pomoRunning ? fmtTime(pomoRemaining) : fmtTime(pomoPhase === 'focus' ? pomoFocusSeconds : pomoBreakSeconds);
        html += '<div class="pomo-time' + (pomoRunning ? ' running' : '') + '">' + display + '</div>';
        if (pomoRunning) {
          html += '<div class="pomo-cyclecount">Round ' + (pomoCycleCount + (pomoPhase === 'break' ? 0 : 1)) + '</div>';
        } else {
          html += '<div style="display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap;">';
          html += '<label style="display:flex;flex-direction:column;gap:4px;align-items:center;"><span style="font-size:11px;color:#889;text-transform:uppercase;letter-spacing:0.8px;">Focus</span>';
          html += '<input type="text" value="' + pomoFocusInputVal + '" oninput="onPomoFocusInput(this.value)" style="background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;padding:6px 10px;color:#e0e0e0;font-size:14px;width:80px;text-align:center;outline:none;"></label>';
          html += '<label style="display:flex;flex-direction:column;gap:4px;align-items:center;"><span style="font-size:11px;color:#889;text-transform:uppercase;letter-spacing:0.8px;">Break</span>';
          html += '<input type="text" value="' + pomoBreakInputVal + '" oninput="onPomoBreakInput(this.value)" style="background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;padding:6px 10px;color:#e0e0e0;font-size:14px;width:80px;text-align:center;outline:none;"></label>';
          html += '</div>';
        }
      } else {
        // Single mode
        const display = pomoRunning ? fmtTime(pomoRemaining) : fmtTime(pomoSeconds);
        html += '<div class="pomo-time' + (pomoRunning ? ' running' : '') + '">' + display + '</div>';
        if (!pomoRunning) {
          html += '<div style="display:flex;gap:8px;align-items:center">';
          html += '<input type="text" id="pomoInput" placeholder="e.g. 5, 1h30m, 90m" value="' + pomoInputVal + '" style="background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;padding:8px 12px;color:#e0e0e0;font-size:16px;width:180px;text-align:center;outline:none;" oninput="onPomoInput(this.value)" onkeydown="if(event.key===\'Enter\'||event.metaKey&&event.key===\'Enter\'){event.preventDefault();startPomo()}">';
          html += '</div>';
          html += '<div class="pomo-presets">';
          [5, 10, 15, 25, 30, 60].forEach(m => {
            html += '<button onclick="setPomoPreset(' + m + ')">' + (m >= 60 ? (m/60) + 'h' : m + 'm') + '</button>';
          });
          html += '</div>';
        }
      }

      html += '<div class="pomo-controls">';
      if (pomoRunning) {
        html += '<button class="primary" onclick="stopPomo()">Stop</button>';
        if (pomoMode === 'cycle') {
          html += '<button onclick="skipPomoPhase()">Skip phase</button>';
        }
      } else {
        html += '<button class="primary" onclick="startPomo()">Start</button>';
      }
      html += '<button onclick="resetPomo()">Reset</button>';
      html += '</div>';
      html += '</div>';
      return html;
    }

    function setPomoMode(mode) {
      if (pomoRunning) return;
      pomoMode = mode;
      pomoPhase = 'focus';
      pomoCycleCount = 0;
      render();
    }

    function onPomoFocusInput(val) {
      pomoFocusInputVal = val;
      const secs = parsePomoInput(val);
      if (secs > 0) pomoFocusSeconds = secs;
    }

    function onPomoBreakInput(val) {
      pomoBreakInputVal = val;
      const secs = parsePomoInput(val);
      if (secs > 0) pomoBreakSeconds = secs;
    }

    function skipPomoPhase() {
      if (!pomoRunning || pomoMode !== 'cycle') return;
      advancePomoPhase();
      if (currentTab === 'pomodoro') render();
      updateMenuBar();
    }

    function advancePomoPhase() {
      if (pomoPhase === 'focus') {
        pomoCycleCount++;
        pomoPhase = 'break';
        pomoRemaining = pomoBreakSeconds;
        try { new Notification('Break time', { body: fmtTime(pomoBreakSeconds) + ' break' }); } catch {}
      } else {
        pomoPhase = 'focus';
        pomoRemaining = pomoFocusSeconds;
        try { new Notification('Back to focus', { body: 'Round ' + (pomoCycleCount + 1) }); } catch {}
      }
    }

    let pomoInputVal = '10m';

    function parsePomoInput(val) {
      val = val.trim().toLowerCase();
      if (!val) return 0;
      // Try "1h30m", "1h", "30m", or just a number (minutes)
      let totalSeconds = 0;
      const hMatch = val.match(/(\d+)\s*h/);
      const mMatch = val.match(/(\d+)\s*m/);
      if (hMatch) totalSeconds += parseInt(hMatch[1]) * 3600;
      if (mMatch) totalSeconds += parseInt(mMatch[1]) * 60;
      if (!hMatch && !mMatch) {
        const n = parseFloat(val);
        if (!isNaN(n)) totalSeconds = Math.round(n * 60);
      }
      return totalSeconds;
    }

    function onPomoInput(val) {
      pomoInputVal = val;
      const secs = parsePomoInput(val);
      if (secs > 0) {
        pomoSeconds = secs;
        pomoRemaining = secs;
        // Update display without full re-render (avoids losing focus)
        const timeEl = document.querySelector('.pomo-time');
        if (timeEl) timeEl.textContent = fmtTime(secs);
      }
    }

    function setPomoPreset(mins) {
      if (pomoRunning) return;
      pomoInputVal = mins >= 60 ? (mins/60) + 'h' : mins + 'm';
      pomoSeconds = mins * 60;
      pomoRemaining = pomoSeconds;
      render();
      // Focus the input after render
      setTimeout(() => { const el = document.getElementById('pomoInput'); if (el) { el.focus(); el.select(); } }, 0);
    }

    function startPomo() {
      if (pomoRunning) return;
      if (pomoMode === 'cycle') {
        // Starting a fresh run: always begin in focus phase
        pomoPhase = 'focus';
        pomoCycleCount = 0;
        pomoRemaining = pomoFocusSeconds;
      } else {
        if (pomoRemaining <= 0) pomoRemaining = pomoSeconds;
      }
      pomoRunning = true;
      render();
      pomoInterval = setInterval(() => {
        pomoRemaining--;
        if (pomoRemaining <= 0) {
          if (pomoMode === 'cycle') {
            advancePomoPhase();
          } else {
            pomoRemaining = 0;
            stopPomo();
            try { new Notification('Time\u2019s up!', { body: 'Pomodoro finished.' }); } catch {}
          }
        }
        updateMenuBar();
        if (currentTab === 'pomodoro') render();
      }, 1000);
    }

    function stopPomo() {
      pomoRunning = false;
      if (pomoInterval) { clearInterval(pomoInterval); pomoInterval = null; }
      // Reset cycle state on stop so next start begins fresh
      if (pomoMode === 'cycle') {
        pomoPhase = 'focus';
        pomoCycleCount = 0;
        pomoRemaining = pomoFocusSeconds;
      }
      render();
    }

    function resetPomo() {
      stopPomo();
      if (pomoMode !== 'cycle') pomoRemaining = pomoSeconds;
      render();
    }

    function updateMenuBar() {
      fs.writeFileSync(path.join(__dirname, 'selection.json'), JSON.stringify({ text: menuBarText() }));
      updatePomoBadge();
    }

    function updatePomoBadge() {
      const badge = document.getElementById('pomo-badge');
      if (!badge) return;
      if (!pomoRunning) {
        badge.style.display = 'none';
        badge.className = '';
        return;
      }
      const time = fmtTime(pomoRemaining);
      let label, cls;
      if (pomoMode === 'cycle') {
        if (pomoPhase === 'break') { label = 'Break'; cls = 'breakp'; }
        else { label = 'Focus'; cls = 'focus'; }
      } else {
        label = 'Pomodoro'; cls = 'single';
      }
      badge.textContent = label + ' \u00B7 ' + time;
      badge.className = cls;
      badge.style.display = 'inline-flex';
    }

    function hasTodayDescendant(node) {
      if (node.today) return true;
      if (!node.children) return false;
      for (const c of node.children) {
        if (hasTodayDescendant(c)) return true;
      }
      return false;
    }

    function renderActiveItems(items, pathPrefix, mode) {
      mode = mode || 'all';
      let html = '';
      items.forEach((item, i) => {
        if (mode === 'today' && !hasTodayDescendant(item)) return;

        const currentPath = [...pathPrefix, i].join('.');
        const hasChildren = item.children && item.children.length > 0;
        const isExpanded = mode === 'today' ? true : expandedIds.has(item.id);
        const isSelected = selectedPath === currentPath;
        const isAncestorOnly = mode === 'today' && !item.today;

        html += '<div class="todo-item" data-path="' + currentPath + '"' +
          (mode === 'all' ? ' ondragover="onDragOver(event,\'' + currentPath + '\')" ondragleave="onDragLeave(event)" ondrop="onDrop(event,\'' + currentPath + '\')"' : '') +
          '>';

        if (isAncestorOnly) {
          html += '<div class="todo-row ancestor">';
          if (hasChildren) {
            html += '<div class="expand-arrow">\u25BC</div>';
          } else {
            html += '<div class="expand-arrow"></div>';
          }
          html += '<span class="todo-text">' + esc(item.text) + '</span>';
          html += '</div>';
        } else {
          html += '<div class="todo-row' + (item.completed ? ' completed' : '') + (isSelected ? ' selected' : '') + '" data-path="' + currentPath + '" onclick="selectByClick(\'' + currentPath + '\')">';

          if (mode === 'all') {
            html += '<div class="drag-handle" draggable="true" ondragstart="onDragStart(event,\'' + currentPath + '\')" ondragend="onDragEnd(event)">\u2847</div>';
          }

          if (hasChildren) {
            html += '<div class="expand-arrow" onclick="event.stopPropagation();toggleExpand(\'' + item.id + '\')">' + (isExpanded ? '\u25BC' : '\u25B6') + '</div>';
          } else {
            html += '<div class="expand-arrow"></div>';
          }

          html += '<div class="checkbox ' + (item.completed ? 'checked' : '') + '" onclick="event.stopPropagation();toggleComplete(\'' + currentPath + '\')"></div>';
          html += '<div class="today-star' + (item.today ? ' on' : '') + '" onclick="event.stopPropagation();toggleToday(\'' + currentPath + '\')" title="Toggle Today (Cmd+T)">' + (item.today ? '\u2605' : '\u2606') + '</div>';
          html += '<span class="todo-text" ondblclick="editTodo(\'' + currentPath + '\', this)">' + esc(item.text) + '</span>';

          if (item.due) {
            html += dueBadge(item.due);
          }

          html += '<div class="todo-actions">';
          html += '<button onclick="event.stopPropagation();promptDueDate(\'' + currentPath + '\')" title="Due date">\uD83D\uDCC5</button>';
          html += '<button onclick="event.stopPropagation();openNotes(\'' + currentPath + '\')" title="Notes">\uD83D\uDCDD</button>';
          html += '<button onclick="event.stopPropagation();startSubAdd(\'' + currentPath + '\', \'' + item.id + '\')" title="Add sub-todo">+</button>';
          html += '<button onclick="event.stopPropagation();removeTodo(\'' + currentPath + '\')" title="Remove">\u2715</button>';
          html += '</div>';
          html += '</div>';

          if (item.notes) {
            html += '<div class="notes-indicator" style="margin-left:42px;font-size:11px;color:#667;padding:2px 0;">has notes</div>';
          }
        }

        if (hasChildren && isExpanded) {
          html += '<div class="children">' + renderActiveItems(item.children, [...pathPrefix, i], mode) + '</div>';
        }

        html += '</div>';
      });
      return html;
    }

    // Group completed items by day
    let expandedDays = new Set();
    let completedDaysInitialized = false;
    let completedViewMode = 'date'; // 'date' or 'tree'
    let expandedTreeGroups = new Set();

    function getDayKey(isoStr) {
      if (!isoStr) return 'Unknown';
      const d = new Date(isoStr);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function getTodayKey() {
      return new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function groupByDay(items) {
      const groups = {};
      const order = [];
      items.forEach((item, origIdx) => {
        const day = getDayKey(item.completed_at);
        if (!groups[day]) { groups[day] = []; order.push(day); }
        groups[day].push({ item, origIdx });
      });
      return { groups, order };
    }

    function renderCompletedItems(items) {
      const { groups, order } = groupByDay(items);

      // Auto-expand today on first render
      if (!completedDaysInitialized) {
        expandedDays.add(getTodayKey());
        completedDaysInitialized = true;
      }

      let html = '';
      order.forEach(day => {
        const isExpanded = expandedDays.has(day);
        const dayId = 'day_' + day.replace(/[^a-zA-Z0-9]/g, '_');
        const isSelected = selectedPath === dayId;

        html += '<div class="todo-item">';
        html += '<div class="todo-row' + (isSelected ? ' selected' : '') + '" data-path="' + dayId + '" onclick="selectByClick(\'' + dayId + '\')" style="padding:10px;margin-top:8px;">';
        html += '<div class="expand-arrow" onclick="event.stopPropagation();toggleDayExpand(\'' + esc(day) + '\')">' + (isExpanded ? '\u25BC' : '\u25B6') + '</div>';
        html += '<span class="todo-text" style="font-weight:600;color:#8899aa;font-size:13px;">' + esc(day) + ' (' + groups[day].length + ')</span>';
        html += '</div>';

        if (isExpanded) {
          html += '<div class="children">';
          groups[day].forEach(({ item, origIdx }) => {
            html += renderCompletedItem(item, origIdx);
          });
          html += '</div>';
        }

        html += '</div>';
      });
      return html;
    }

    function renderCompletedItem(item, origIdx) {
      const hasChildren = item.children && item.children.length > 0;
      const isExpanded = expandedIds.has(item.id);
      const itemPath = 'c_' + origIdx;
      const isSelected = selectedPath === itemPath;

      let html = '<div class="todo-item">';
      html += '<div class="todo-row' + (isSelected ? ' selected' : '') + '" data-path="' + itemPath + '" onclick="selectByClick(\'' + itemPath + '\')">';

      if (hasChildren) {
        html += '<div class="expand-arrow" onclick="event.stopPropagation();toggleExpand(\'' + item.id + '\')">' + (isExpanded ? '\u25BC' : '\u25B6') + '</div>';
      } else {
        html += '<div class="expand-arrow"></div>';
      }

      html += '<span style="color:#556;margin-right:4px;">\u2022</span>';
      html += '<span class="todo-text">' + esc(item.text) + '</span>';

      if (item.completed_at) {
        const d = new Date(item.completed_at);
        html += '<span class="completed-date">' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) + '</span>';
      }

      html += '<div class="todo-actions">';
      html += '<button onclick="event.stopPropagation();openCompletedNotes(' + origIdx + ')" title="Notes">\uD83D\uDCDD</button>';
      html += '<button onclick="event.stopPropagation();restoreTodo(' + origIdx + ')" title="Restore">\u21A9</button>';
      html += '</div>';

      html += '</div>';

      if (item.parent_text && completedViewMode === 'date') {
        html += '<div class="parent-label">from: ' + esc(item.parent_text) + '</div>';
      }

      if (item.notes) {
        html += '<div class="notes-indicator" style="margin-left:42px;font-size:11px;color:#667;padding:2px 0;">has notes</div>';
      }

      if (hasChildren && isExpanded) {
        html += '<div class="children">' + renderCompletedChildren(item.children, itemPath) + '</div>';
      }

      html += '</div>';
      return html;
    }

    function openCompletedNotes(origIdx) {
      const item = completed[origIdx];
      if (!item) return;
      ipcRenderer.send('open-notes', { todoId: item.id, todoText: item.text, notes: item.notes || '' });
    }

    function renderCompletedChildren(items, parentPath) {
      let html = '';
      items.forEach((item, i) => {
        const hasChildren = item.children && item.children.length > 0;
        const isExpanded = expandedIds.has(item.id);
        const childPath = parentPath + '.' + i;
        const isSelected = selectedPath === childPath;

        html += '<div class="todo-item">';
        html += '<div class="todo-row' + (isSelected ? ' selected' : '') + '" data-path="' + childPath + '" onclick="selectByClick(\'' + childPath + '\')">';

        if (hasChildren) {
          html += '<div class="expand-arrow" onclick="event.stopPropagation();toggleExpand(\'' + item.id + '\')">' + (isExpanded ? '\u25BC' : '\u25B6') + '</div>';
        } else {
          html += '<div class="expand-arrow"></div>';
        }

        html += '<span style="color:#556;margin-right:4px;">\u2022</span>';
        html += '<span class="todo-text">' + esc(item.text) + '</span>';
        html += '</div>';

        if (hasChildren && isExpanded) {
          html += '<div class="children">' + renderCompletedChildren(item.children, childPath) + '</div>';
        }

        html += '</div>';
      });
      return html;
    }

    function toggleDayExpand(day) {
      if (expandedDays.has(day)) expandedDays.delete(day);
      else expandedDays.add(day);
      render();
    }

    function setCompletedView(mode) {
      completedViewMode = mode;
      selectedPath = null;
      render();
    }

    function toggleTreeGroupExpand(key) {
      if (expandedTreeGroups.has(key)) expandedTreeGroups.delete(key);
      else expandedTreeGroups.add(key);
      render();
    }

    function renderCompletedByTree(items) {
      // Group by parent_text (top-level items have no parent_text)
      const groups = {};
      const order = [];
      items.forEach((item, origIdx) => {
        const key = item.parent_text || item.text;
        const isTopLevel = !item.parent_text;
        if (!groups[key]) {
          groups[key] = { items: [], isTopLevel };
          order.push(key);
        }
        groups[key].items.push({ item, origIdx });
      });

      // Auto-expand first group on first view
      if (expandedTreeGroups.size === 0 && order.length > 0) {
        expandedTreeGroups.add(order[0]);
      }

      let html = '';
      order.forEach(key => {
        const group = groups[key];

        // Top-level items with no children in this group: render directly, no group wrapper
        if (group.isTopLevel && group.items.length === 1) {
          html += renderCompletedItem(group.items[0].item, group.items[0].origIdx);
          return;
        }

        const isExpanded = expandedTreeGroups.has(key);
        const groupId = 'tree_' + key.replace(/[^a-zA-Z0-9]/g, '_');
        const isSelected = selectedPath === groupId;

        html += '<div class="todo-item">';
        html += '<div class="todo-row' + (isSelected ? ' selected' : '') + '" data-path="' + groupId + '" onclick="selectByClick(\'' + groupId + '\')" style="padding:10px;margin-top:8px;">';
        html += '<div class="expand-arrow" onclick="event.stopPropagation();toggleTreeGroupExpand(\'' + esc(key).replace(/'/g, "\\'") + '\')">' + (isExpanded ? '\u25BC' : '\u25B6') + '</div>';
        html += '<span class="todo-text" style="font-weight:600;color:#8899aa;font-size:13px;">' + esc(key) + ' (' + group.items.length + ')</span>';
        html += '</div>';

        if (isExpanded) {
          html += '<div class="children">';
          group.items.forEach(({ item, origIdx }) => {
            html += renderCompletedItem(item, origIdx);
          });
          html += '</div>';
        }

        html += '</div>';
      });
      return html;
    }

    // Build visible paths for completed tab (handles both view modes)
    function getVisibleCompletedPaths() {
      if (completedViewMode === 'tree') {
        return getVisibleCompletedTreePaths();
      }
      return getVisibleCompletedDatePaths();
    }

    function getVisibleCompletedTreePaths() {
      const groups = {};
      const groupIsTopLevel = {};
      const order = [];
      completed.forEach((item, origIdx) => {
        const key = item.parent_text || item.text;
        const isTopLevel = !item.parent_text;
        if (!groups[key]) { groups[key] = []; groupIsTopLevel[key] = isTopLevel; order.push(key); }
        groups[key].push({ item, origIdx });
      });
      const paths = [];
      order.forEach(key => {
        // Single top-level items render directly, no group header
        if (groupIsTopLevel[key] && groups[key].length === 1) {
          const { item, origIdx } = groups[key][0];
          const itemPath = 'c_' + origIdx;
          paths.push({ path: itemPath, type: 'item', origIdx, id: item.id });
          if (item.children && item.children.length > 0 && expandedIds.has(item.id)) {
            walkCompletedChildren(item.children, itemPath, paths);
          }
          return;
        }
        const groupId = 'tree_' + key.replace(/[^a-zA-Z0-9]/g, '_');
        paths.push({ path: groupId, type: 'group', key });
        if (expandedTreeGroups.has(key)) {
          groups[key].forEach(({ item, origIdx }) => {
            const itemPath = 'c_' + origIdx;
            paths.push({ path: itemPath, type: 'item', origIdx, id: item.id });
            if (item.children && item.children.length > 0 && expandedIds.has(item.id)) {
              walkCompletedChildren(item.children, itemPath, paths);
            }
          });
        }
      });
      return paths;
    }

    // Build visible paths for completed date view
    function walkCompletedChildren(children, pathPrefix, paths) {
      children.forEach((child, i) => {
        const childPath = pathPrefix + '.' + i;
        paths.push({ path: childPath, type: 'child', id: child.id });
        if (child.children && child.children.length > 0 && expandedIds.has(child.id)) {
          walkCompletedChildren(child.children, childPath, paths);
        }
      });
    }

    function getVisibleCompletedDatePaths() {
      const { groups, order } = groupByDay(completed);
      const paths = [];
      order.forEach(day => {
        const dayId = 'day_' + day.replace(/[^a-zA-Z0-9]/g, '_');
        paths.push({ path: dayId, type: 'day', day });
        if (expandedDays.has(day)) {
          groups[day].forEach(({ item, origIdx }) => {
            const itemPath = 'c_' + origIdx;
            paths.push({ path: itemPath, type: 'item', origIdx, id: item.id });
            if (item.children && item.children.length > 0 && expandedIds.has(item.id)) {
              walkCompletedChildren(item.children, itemPath, paths);
            }
          });
        }
      });
      return paths;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function getByPath(pathStr) {
      const parts = pathStr.split('.').map(Number);
      let list = todos;
      let node = null;
      for (let i = 0; i < parts.length; i++) {
        node = list[parts[i]];
        if (i < parts.length - 1) list = node.children;
      }
      return { node, list, idx: parts[parts.length - 1], isTopLevel: parts.length === 1 };
    }

    function deepCopy(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function selectByClick(pathStr) {
      selectedPath = pathStr;
      document.getElementById('newTodo').blur();
      render();
    }

    function toggleToday(pathStr) {
      const { node } = getByPath(pathStr);
      if (node.today) {
        delete node.today;
      } else {
        node.today = true;
      }
      saveTodos();
      render();
    }

    // ===== Command Palette =====
    let paletteOpen = false;
    let paletteIdx = 0;

    function hasSelection() { return selectedPath !== null; }
    function isActive() { return currentTab === 'active'; }

    function getCommands() {
      return [
        { label: 'Toggle Today flag on selected', shortcut: '\u2318T',
          run: () => { if (hasSelection() && isActive()) toggleToday(selectedPath); },
          enabled: hasSelection() && isActive() },
        { label: 'Toggle Today-only view', shortcut: '\u2318\u21E7T',
          run: () => { if (isActive()) { todayOnlyMode = !todayOnlyMode; render(); } },
          enabled: isActive() },
        { label: 'Complete selected todo', shortcut: '\u21E7\u21B5',
          run: () => { if (hasSelection() && isActive()) toggleComplete(selectedPath); },
          enabled: hasSelection() && isActive() },
        { label: 'Add sub-todo to selected', shortcut: '\u2318\u21E7=',
          run: () => { if (hasSelection() && isActive()) { const { node } = getByPath(selectedPath); startSubAdd(selectedPath, node.id); } },
          enabled: hasSelection() && isActive() },
        { label: 'Edit selected todo', shortcut: 'E', enabled: hasSelection() && isActive() },
        { label: 'Open notes for selected', shortcut: 'N',
          run: () => { if (hasSelection()) openNotes(selectedPath); },
          enabled: hasSelection() },
        { label: 'Set due date on selected', shortcut: 'D',
          run: () => { if (hasSelection() && isActive()) promptDueDate(selectedPath); },
          enabled: hasSelection() && isActive() },
        { label: 'Remove selected todo', shortcut: 'Delete',
          run: () => { if (hasSelection() && isActive()) removeTodo(selectedPath); },
          enabled: hasSelection() && isActive() },
        { label: 'Navigate down', shortcut: '\u2193' },
        { label: 'Navigate up', shortcut: '\u2191' },
        { label: 'Reorder selected down', shortcut: '\u21E7\u2193', enabled: hasSelection() && isActive() },
        { label: 'Reorder selected up', shortcut: '\u21E7\u2191', enabled: hasSelection() && isActive() },
        { label: 'Expand/collapse selected', shortcut: '\u21B5', enabled: hasSelection() && isActive() },
        { label: 'Add sibling todo below', shortcut: '\u21E7+', enabled: hasSelection() && isActive() },
        { label: 'Archive completed sub-todo', shortcut: '\u21E7Esc', enabled: hasSelection() && isActive() },
        { label: 'Start pomodoro cycle (or stop running)', shortcut: '\u2318\u21E7C',
          run: () => { if (pomoRunning) stopPomo(); else { pomoMode = 'cycle'; startPomo(); } }, enabled: true },
        { label: 'Next tab', shortcut: '\u2318\u21E7]',
          run: () => { const t = ['active','completed','pomodoro']; switchTab(t[(t.indexOf(currentTab)+1)%t.length]); }, enabled: true },
        { label: 'Previous tab', shortcut: '\u2318\u21E7[',
          run: () => { const t = ['active','completed','pomodoro']; switchTab(t[(t.indexOf(currentTab)-1+t.length)%t.length]); }, enabled: true },
        { label: 'Show commands', shortcut: '\u2318K', run: () => openPalette(), enabled: true },
      ];
    }

    function getFilteredCommands() {
      const q = (document.getElementById('paletteInput').value || '').trim().toLowerCase();
      const cmds = getCommands();
      if (!q) return cmds;
      return cmds.filter(c => c.label.toLowerCase().includes(q) || (c.shortcut || '').toLowerCase().includes(q));
    }

    function openPalette() {
      paletteOpen = true;
      paletteIdx = 0;
      const overlay = document.getElementById('palette-overlay');
      overlay.style.display = 'flex';
      const input = document.getElementById('paletteInput');
      input.value = '';
      renderPalette();
      setTimeout(() => input.focus(), 0);
    }

    function closePalette() {
      paletteOpen = false;
      document.getElementById('palette-overlay').style.display = 'none';
    }

    function renderPalette() {
      const list = document.getElementById('paletteList');
      const cmds = getFilteredCommands();
      if (paletteIdx >= cmds.length) paletteIdx = Math.max(0, cmds.length - 1);
      let html = '';
      cmds.forEach((c, i) => {
        const isSel = i === paletteIdx;
        const disabled = c.enabled === false;
        html += '<div class="palette-item' + (isSel ? ' selected' : '') + (disabled ? ' disabled' : '') +
          '" onclick="runPaletteIdx(' + i + ')">' +
          '<span>' + esc(c.label) + '</span>' +
          (c.shortcut ? '<span class="palette-shortcut">' + esc(c.shortcut) + '</span>' : '') +
          '</div>';
      });
      if (cmds.length === 0) html = '<div class="palette-item disabled">No matches</div>';
      list.innerHTML = html;
      const sel = list.querySelector('.palette-item.selected');
      if (sel) sel.scrollIntoView({ block: 'nearest' });
    }

    function runPaletteIdx(i) {
      const cmds = getFilteredCommands();
      const c = cmds[i];
      if (!c || c.enabled === false) return;
      closePalette();
      if (c.run) c.run();
    }

    function addTodo() {
      const input = document.getElementById('newTodo');
      const text = input.value.trim();
      if (!text) return;
      const todo = { id: genId(), text, completed: false, notes: '', created: new Date().toISOString(), children: [] };
      if (todayOnlyMode) todo.today = true;
      todos.push(todo);
      input.value = '';
      saveTodos();
      render();
    }

    function completeAll(n) {
      n.completed = true;
      n.children.forEach(completeAll);
    }

    function toggleComplete(pathStr) {
      const { node, list, idx, isTopLevel } = getByPath(pathStr);

      if (node.completed) {
        node.completed = false;
        saveTodos();
        render();
        return;
      }

      completeAll(node);
      node.completed_at = new Date().toISOString();
      const copy = deepCopy(node);
      // Save restore position
      if (isTopLevel) {
        copy.original_index = idx;
      } else {
        // Add parent context for sub-todos
        const parts = pathStr.split('.');
        let parentText = '';
        // Save parent id for restore
        const parentPath = parts.slice(0, -1).join('.');
        try {
          const parentNode = getByPath(parentPath).node;
          copy.original_parent_id = parentNode.id;
          copy.original_child_index = parseInt(parts[parts.length - 1]);
          let p = getByPath('' + parts[0]).node;
          parentText = p.text;
          for (let i = 1; i < parts.length - 1; i++) {
            p = p.children[parseInt(parts[i])];
            parentText += ' > ' + p.text;
          }
        } catch {}
        copy.parent_text = parentText;
      }
      // Remove any existing entry with the same id before adding
      const existingIdx = completed.findIndex(c => c.id === copy.id);
      if (existingIdx >= 0) completed.splice(existingIdx, 1);
      completed.unshift(copy);
      saveCompleted();

      if (isTopLevel) {
        list.splice(idx, 1);
        // Fix selectedPath after removal
        const visible = getVisiblePaths();
        if (visible.length === 0) {
          selectedPath = null;
        } else {
          // Select next item or last item
          const selIdx = Math.min(idx, visible.length - 1);
        }
      }

      saveTodos();
      // Recompute selection after completing top-level
      if (isTopLevel) {
        const vis = getVisiblePaths();
        if (vis.length === 0) selectedPath = null;
        else {
          const newIdx = Math.min(parseInt(pathStr), vis.length - 1);
          selectedPath = vis[newIdx].path;
        }
      }
      render();
    }

    function restoreTodo(completedIdx) {
      const item = completed[completedIdx];
      function uncompleteAll(n) {
        n.completed = false;
        delete n.completed_at;
        delete n.parent_text;
        delete n.original_index;
        delete n.original_parent_id;
        delete n.original_child_index;
        n.children.forEach(uncompleteAll);
      }

      // Check if this item still exists in the active tree (sub-todos stay in active when completed)
      const existing = findNodeById(todos, item.id);
      if (existing) {
        // Just uncomplete it in place
        uncompleteAll(existing);
      } else {
        // Re-insert it
        const restored = deepCopy(item);
        uncompleteAll(restored);

        if (item.original_parent_id) {
          const parent = findNodeById(todos, item.original_parent_id);
          if (parent) {
            const idx = Math.min(item.original_child_index || 0, parent.children.length);
            parent.children.splice(idx, 0, restored);
          } else {
            todos.push(restored);
          }
        } else if (item.original_index !== undefined) {
          const idx = Math.min(item.original_index, todos.length);
          todos.splice(idx, 0, restored);
        } else {
          todos.push(restored);
        }
      }

      completed.splice(completedIdx, 1);
      save();
      render();
    }

    function toggleExpand(id) {
      if (expandedIds.has(id)) expandedIds.delete(id);
      else expandedIds.add(id);
      render();
    }

    // Notes editor window
    function openNotes(pathStr) {
      const { node } = getByPath(pathStr);
      ipcRenderer.send('open-notes', { todoId: node.id, todoText: node.text, notes: node.notes || '' });
    }

    function findNodeById(items, id) {
      for (const item of items) {
        if (item.id === id) return item;
        const found = findNodeById(item.children || [], id);
        if (found) return found;
      }
      return null;
    }

    // Receive saved notes back from editor window
    ipcRenderer.on('notes-saved', (event, { todoId, notes }) => {
      const node = findNodeById(todos, todoId);
      if (node) {
        node.notes = notes;
        saveTodos();
      }
      const cNode = findNodeById(completed, todoId);
      if (cNode) {
        cNode.notes = notes;
        saveCompleted();
      }
      render();
    });

    function removeTodo(pathStr) {
      const visible = getVisiblePaths();
      const visIdx = visible.findIndex(v => v.path === pathStr);
      const { list, idx } = getByPath(pathStr);
      list.splice(idx, 1);
      saveTodos();
      // Select next or previous
      const newVisible = getVisiblePaths();
      if (newVisible.length === 0) {
        selectedPath = null;
      } else {
        const newIdx = Math.min(visIdx, newVisible.length - 1);
        selectedPath = newVisible[newIdx].path;
      }
      render();
    }

    function editTodo(pathStr, el) {
      const { node } = getByPath(pathStr);
      const input = document.createElement('input');
      input.value = node.text;
      input.style.cssText = 'flex:1;background:#1a1a2e;border:1px solid #009900;border-radius:4px;padding:2px 6px;color:#e0e0e0;font-size:14px;outline:none;';
      el.replaceWith(input);
      input.focus();
      input.select();

      function commit() {
        const newText = input.value.trim();
        if (newText) node.text = newText;
        saveTodos();
        render();
      }
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') render(); });
    }

    function startSubAdd(parentPath, parentId) {
      expandedIds.add(parentId);
      render();
      setTimeout(() => {
        const existing = document.querySelector('.sub-add[data-path="' + parentPath + '"]');
        if (existing) { existing.querySelector('input').focus(); return; }

        const div = document.createElement('div');
        div.className = 'sub-add';
        div.dataset.path = parentPath;
        div.innerHTML = '<input type="text" placeholder="Add sub-todo..." onkeydown="if(event.key===\'Enter\'&&event.metaKey)commitSubAdd(\'' + parentPath + '\',\'' + parentId + '\',this);if(event.key===\'Escape\')this.closest(\'.sub-add\').remove()">' +
          '<button onclick="commitSubAdd(\'' + parentPath + '\',\'' + parentId + '\',this.previousElementSibling)">Add</button>';

        const addBar = document.querySelector('.add-bar');
        addBar.insertAdjacentElement('beforebegin', div);
        div.querySelector('input').focus();
      }, 0);
    }

    function commitSubAdd(parentPath, parentId, inputEl) {
      const text = inputEl.value.trim();
      if (!text) return;
      const { node } = getByPath(parentPath);
      const sub = { id: genId(), text, completed: false, notes: '', created: new Date().toISOString(), children: [] };
      if (todayOnlyMode) sub.today = true;
      node.children.push(sub);
      expandedIds.add(parentId);
      saveTodos();
      const subAdd = inputEl.closest('.sub-add');
      if (subAdd) subAdd.remove();
      render();
    }

    // Due date helpers
    function dueBadge(dueStr) {
      const now = new Date();
      const hasTime = dueStr.includes('T');
      const due = hasTime ? new Date(dueStr) : new Date(dueStr + 'T23:59:59');
      const diffMs = due - now;
      const diffMins = Math.round(diffMs / 60000);
      const diffHours = Math.floor(Math.abs(diffMins) / 60);
      const remMins = Math.abs(diffMins) % 60;
      let label, cls = 'due-date';

      if (diffMs < 0) {
        // Overdue
        cls += ' overdue';
        if (hasTime && Math.abs(diffMins) < 1440) {
          label = (diffHours > 0 ? diffHours + 'h' : '') + (remMins > 0 ? remMins + 'm' : '') + ' overdue';
        } else {
          const diffDays = Math.ceil(Math.abs(diffMs) / (1000 * 60 * 60 * 24));
          label = diffDays + 'd overdue';
        }
      } else if (hasTime && diffMins < 1440) {
        // Due within 24h with a time set — show hours/minutes
        if (diffMins <= 0) { label = 'due now'; cls += ' overdue'; }
        else {
          const h = Math.floor(diffMins / 60);
          const m = diffMins % 60;
          label = (h > 0 ? h + 'h' : '') + (m > 0 ? m + 'm' : '') + ' left';
          cls += diffMins <= 60 ? ' overdue' : diffMins <= 180 ? ' today' : ' soon';
        }
      } else {
        // Date-only or more than 24h away
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const dueDay = new Date(due.getFullYear(), due.getMonth(), due.getDate());
        const diffDays = Math.round((dueDay - today) / (1000 * 60 * 60 * 24));
        if (diffDays === 0) { label = 'due today'; cls += ' today'; }
        else if (diffDays === 1) { label = 'due tomorrow'; cls += ' soon'; }
        else if (diffDays <= 3) { label = diffDays + 'd left'; cls += ' soon'; }
        else { label = diffDays + 'd left'; }
      }
      return '<span class="' + cls + '">' + label + '</span>';
    }

    // Refresh due badges every 30s
    setInterval(() => { if (currentTab === 'active') render(); }, 30000);

    function parseTimeStr(str) {
      // Parses "3pm", "3:30pm", "15:00", "3:30PM" → { hours, minutes } or null
      str = str.trim().toLowerCase();
      const ampm = str.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/);
      if (ampm) {
        let h = parseInt(ampm[1]);
        const m = ampm[2] ? parseInt(ampm[2]) : 0;
        if (ampm[3] === 'pm' && h !== 12) h += 12;
        if (ampm[3] === 'am' && h === 12) h = 0;
        return { hours: h, minutes: m };
      }
      const mil = str.match(/^(\d{1,2}):(\d{2})$/);
      if (mil) {
        const h = parseInt(mil[1]);
        const m = parseInt(mil[2]);
        if (h >= 0 && h <= 23) return { hours: h, minutes: m };
      }
      return null;
    }

    function parseDueDate(val) {
      val = val.trim().toLowerCase();
      const now = new Date();
      const year = now.getFullYear();
      const today = new Date(year, now.getMonth(), now.getDate());

      // Split off a trailing time component
      let timePart = null;
      const timeAtEnd = val.match(/^(.+?)\s+(\d{1,2}(?::\d{2})?\s*(?:am|pm)|\d{1,2}:\d{2})$/);
      if (timeAtEnd) {
        const parsed = parseTimeStr(timeAtEnd[2]);
        if (parsed) {
          timePart = parsed;
          val = timeAtEnd[1].trim();
        }
      }

      // Check if the entire input is just a time (means today at that time)
      if (!timePart) {
        const justTime = parseTimeStr(val);
        if (justTime) {
          timePart = justTime;
          val = 'today';
        }
      }

      function withTime(dateStr) {
        if (!timePart) return dateStr;
        return dateStr + 'T' + String(timePart.hours).padStart(2,'0') + ':' + String(timePart.minutes).padStart(2,'0') + ':00';
      }

      if (val === 'today') return withTime(fmtDate(today));
      if (val === 'tomorrow' || val === 'tmrw') {
        today.setDate(today.getDate() + 1);
        return withTime(fmtDate(today));
      }

      // +Nd or Nd
      const relMatch = val.match(/^\+?(\d+)\s*d$/);
      if (relMatch) {
        today.setDate(today.getDate() + parseInt(relMatch[1]));
        return withTime(fmtDate(today));
      }

      // +Nw
      const weekMatch = val.match(/^\+?(\d+)\s*w$/);
      if (weekMatch) {
        today.setDate(today.getDate() + parseInt(weekMatch[1]) * 7);
        return withTime(fmtDate(today));
      }

      // Day names
      const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
      const dayIdx = days.findIndex(d => d.startsWith(val));
      if (dayIdx >= 0) {
        let diff = dayIdx - today.getDay();
        if (diff <= 0) diff += 7;
        today.setDate(today.getDate() + diff);
        return withTime(fmtDate(today));
      }

      // ISO format with time already: YYYY-MM-DDTHH:MM
      const isoTimeMatch = val.match(/^(\d{4}-\d{1,2}-\d{1,2})t(\d{1,2}:\d{2})/);
      if (isoTimeMatch) return val.toUpperCase();

      // ISO format: YYYY-MM-DD
      const isoMatch = val.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if (isoMatch) return withTime(val);

      // M/D or M/D/YYYY
      const slashMatch = val.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/);
      if (slashMatch) {
        const m = parseInt(slashMatch[1]);
        const d = parseInt(slashMatch[2]);
        let y = slashMatch[3] ? parseInt(slashMatch[3]) : year;
        if (y < 100) y += 2000;
        return withTime(fmtDate(new Date(y, m - 1, d)));
      }

      // "apr 15" or "april 15"
      const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
      const monMatch = val.match(/^([a-z]+)\s+(\d{1,2})$/);
      if (monMatch) {
        const mIdx = months.findIndex(m => monMatch[1].startsWith(m));
        if (mIdx >= 0) {
          return withTime(fmtDate(new Date(year, mIdx, parseInt(monMatch[2]))));
        }
      }

      // Bare number — day of current month
      const bareNum = val.match(/^(\d{1,2})$/);
      if (bareNum) {
        const d = parseInt(bareNum[1]);
        if (d >= 1 && d <= 31) {
          let target = new Date(year, now.getMonth(), d);
          if (target < today) target.setMonth(target.getMonth() + 1);
          return withTime(fmtDate(target));
        }
      }

      return null;
    }

    function fmtDate(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function promptDueDate(pathStr) {
      render();
      setTimeout(() => {
        const existing = document.querySelector('.due-input-row');
        if (existing) existing.remove();

        const { node } = getByPath(pathStr);
        const div = document.createElement('div');
        div.className = 'due-input-row';
        div.innerHTML = '<input type="text" placeholder="e.g. tomorrow 3pm, fri, +3d, apr 15 2:30pm" value="' + (node.due || '') + '" ' +
          'onkeydown="if(event.key===\'Enter\'&&event.metaKey){commitDueDate(\'' + pathStr + '\',this.value);}" ' +
          'onkeyup="if(event.key===\'Escape\')this.closest(\'.due-input-row\').remove()">' +
          '<button onclick="commitDueDate(\'' + pathStr + '\',this.previousElementSibling.value)">Set</button>' +
          '<button onclick="clearDueDate(\'' + pathStr + '\');this.closest(\'.due-input-row\').remove()">Clear</button>';

        const addBar = document.querySelector('.add-bar');
        addBar.insertAdjacentElement('beforebegin', div);
        div.querySelector('input').focus();
        div.querySelector('input').select();
      }, 0);
    }

    function commitDueDate(pathStr, val) {
      const date = parseDueDate(val);
      if (!date) return;
      const { node } = getByPath(pathStr);
      node.due = date;
      saveTodos();
      const row = document.querySelector('.due-input-row');
      if (row) row.remove();
      render();
    }

    function clearDueDate(pathStr) {
      const { node } = getByPath(pathStr);
      delete node.due;
      saveTodos();
      render();
    }

    // Drag and drop reordering
    let dragPath = null;

    function onDragStart(e, pathStr) {
      dragPath = pathStr;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', pathStr);
      // Mark the dragged item
      setTimeout(() => {
        const el = document.querySelector('.todo-item[data-path="' + pathStr + '"]');
        if (el) el.classList.add('dragging');
      }, 0);
    }

    function onDragEnd(e) {
      document.querySelectorAll('.todo-item').forEach(el => {
        el.classList.remove('dragging', 'drag-over-above', 'drag-over-below');
      });
      dragPath = null;
    }

    function onDragOver(e, targetPath) {
      if (!dragPath || dragPath === targetPath) return;
      // Only allow reordering among siblings (same parent)
      const dragParent = dragPath.includes('.') ? dragPath.substring(0, dragPath.lastIndexOf('.')) : '';
      const targetParent = targetPath.includes('.') ? targetPath.substring(0, targetPath.lastIndexOf('.')) : '';
      if (dragParent !== targetParent) return;

      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';

      const el = document.querySelector('.todo-item[data-path="' + targetPath + '"]');
      if (!el) return;
      // Clear other indicators
      document.querySelectorAll('.todo-item').forEach(i => i.classList.remove('drag-over-above', 'drag-over-below'));
      const rect = el.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      if (e.clientY < midY) {
        el.classList.add('drag-over-above');
      } else {
        el.classList.add('drag-over-below');
      }
    }

    function onDragLeave(e) {
      const el = e.currentTarget;
      el.classList.remove('drag-over-above', 'drag-over-below');
    }

    function onDrop(e, targetPath) {
      e.preventDefault();
      if (!dragPath || dragPath === targetPath) return;

      const dragParent = dragPath.includes('.') ? dragPath.substring(0, dragPath.lastIndexOf('.')) : '';
      const targetParent = targetPath.includes('.') ? targetPath.substring(0, targetPath.lastIndexOf('.')) : '';
      if (dragParent !== targetParent) return;

      // Get the sibling list
      let list;
      if (dragParent === '') {
        list = todos;
      } else {
        const { node } = getByPath(dragParent);
        list = node.children;
      }

      const dragIdx = parseInt(dragPath.split('.').pop());
      const targetIdx = parseInt(targetPath.split('.').pop());

      // Determine if dropping above or below
      const el = document.querySelector('.todo-item[data-path="' + targetPath + '"]');
      const rect = el.getBoundingClientRect();
      const dropAbove = e.clientY < rect.top + rect.height / 2;

      // Remove dragged item
      const [item] = list.splice(dragIdx, 1);

      // Insert at new position
      let insertIdx = targetIdx;
      if (dragIdx < targetIdx) insertIdx--; // adjust for removal
      if (!dropAbove) insertIdx++;
      list.splice(insertIdx, 0, item);

      dragPath = null;
      saveTodos();
      render();
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {

      // Cmd+K → open command palette (always works)
      if (e.metaKey && !e.shiftKey && (e.key === 'k' || e.key === 'K')) {
        e.preventDefault();
        if (paletteOpen) closePalette(); else openPalette();
        return;
      }

      // Palette-level handling: intercept keys while palette is open
      if (paletteOpen) {
        if (e.key === 'Escape') {
          e.preventDefault();
          closePalette();
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          const cmds = getFilteredCommands();
          if (cmds.length > 0) paletteIdx = (paletteIdx + 1) % cmds.length;
          renderPalette();
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          const cmds = getFilteredCommands();
          if (cmds.length > 0) paletteIdx = (paletteIdx - 1 + cmds.length) % cmds.length;
          renderPalette();
          return;
        }
        if (e.key === 'Enter') {
          e.preventDefault();
          runPaletteIdx(paletteIdx);
          return;
        }
        // Let typed characters fall through to the input; re-render after
        setTimeout(renderPalette, 0);
        return;
      }

      // Cmd+Shift+] → next tab, Cmd+Shift+[ → previous tab (always works)
      const tabOrder = ['active', 'completed', 'pomodoro'];
      if (e.metaKey && e.shiftKey && e.key === ']') {
        e.preventDefault();
        const idx = tabOrder.indexOf(currentTab);
        switchTab(tabOrder[(idx + 1) % tabOrder.length]);
        return;
      }
      if (e.metaKey && e.shiftKey && e.key === '[') {
        e.preventDefault();
        const idx = tabOrder.indexOf(currentTab);
        switchTab(tabOrder[(idx - 1 + tabOrder.length) % tabOrder.length]);
        return;
      }

      // Cmd+Shift+T → toggle Today-only view mode (active tab)
      if (e.metaKey && e.shiftKey && (e.key === 't' || e.key === 'T')) {
        if (currentTab === 'active') {
          e.preventDefault();
          todayOnlyMode = !todayOnlyMode;
          render();
          return;
        }
      }

      // Cmd+Shift+C → start a new pomodoro cycle (or stop running timer)
      if (e.metaKey && e.shiftKey && (e.key === 'c' || e.key === 'C')) {
        e.preventDefault();
        if (pomoRunning) {
          stopPomo();
        } else {
          pomoMode = 'cycle';
          startPomo();
        }
        return;
      }

      // Cmd+T → toggle Today flag on selected todo (active tab only)
      if (e.metaKey && !e.shiftKey && (e.key === 't' || e.key === 'T')) {
        if (currentTab === 'active' && selectedPath !== null) {
          e.preventDefault();
          toggleToday(selectedPath);
          return;
        }
      }

      // Skip if typing in an input/textarea
      const tag = document.activeElement.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') {
        // Arrow down from add bar selects first todo
        if (document.activeElement.id === 'newTodo') {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            const vis = getVisiblePaths();
            if (vis.length > 0) {
              selectedPath = vis[0].path;
              document.activeElement.blur();
              render();
            }
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            const vis = getVisiblePaths();
            if (vis.length > 0) {
              selectedPath = vis[vis.length - 1].path;
              document.activeElement.blur();
              render();
            }
          }
        }
        return;
      }

      // Completed tab navigation
      if (currentTab === 'completed') {
        const cVisible = getVisibleCompletedPaths();
        if (cVisible.length === 0) return;
        const cIdx = selectedPath !== null ? cVisible.findIndex(v => v.path === selectedPath) : -1;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (cIdx < 0) selectedPath = cVisible[0].path;
          else if (cIdx < cVisible.length - 1) selectedPath = cVisible[cIdx + 1].path;
          render(); return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (cIdx < 0) selectedPath = cVisible[cVisible.length - 1].path;
          else if (cIdx > 0) selectedPath = cVisible[cIdx - 1].path;
          render(); return;
        }
        if (e.key === 'Enter' && !e.shiftKey && !e.metaKey && selectedPath !== null) {
          e.preventDefault();
          const entry = cVisible[cIdx];
          if (entry) {
            if (entry.type === 'day') {
              toggleDayExpand(entry.day);
            } else if (entry.type === 'group') {
              toggleTreeGroupExpand(entry.key);
            } else if (entry.type === 'item') {
              const item = completed[entry.origIdx];
              if (item && item.children && item.children.length > 0) {
                toggleExpand(item.id);
              }
            } else if (entry.type === 'child') {
              toggleExpand(entry.id);
            }
          }
          return;
        }
        if ((e.key === 'n' || e.key === 'N') && selectedPath !== null) {
          e.preventDefault();
          const entry = cVisible[cIdx];
          if (entry && entry.type === 'item') {
            openCompletedNotes(entry.origIdx);
          }
          return;
        }
        if (e.key === 'Enter' && e.shiftKey && selectedPath !== null) {
          e.preventDefault();
          const entry = cVisible[cIdx];
          if (entry && entry.type === 'item') {
            restoreTodo(entry.origIdx);
          }
          return;
        }
        if ((e.key === 'Backspace' || e.key === 'Delete') && selectedPath !== null) {
          e.preventDefault();
          const entry = cVisible[cIdx];
          if (entry && entry.type === 'item') {
            completed.splice(entry.origIdx, 1);
            saveCompleted();
            const newVisible = getVisibleCompletedPaths();
            if (newVisible.length === 0) selectedPath = null;
            else {
              const newIdx = Math.min(cIdx, newVisible.length - 1);
              selectedPath = newVisible[newIdx].path;
            }
            render();
          }
          return;
        }
        if (e.key === 'Escape') {
          e.preventDefault();
          selectedPath = null;
          render(); return;
        }
        return;
      }

      if (currentTab !== 'active') return;

      const visible = getVisiblePaths();
      if (visible.length === 0) return;

      const currentIdx = selectedPath !== null ? visible.findIndex(v => v.path === selectedPath) : -1;

      // Shift+Arrow - reorder among siblings
      if (e.shiftKey && (e.key === 'ArrowDown' || e.key === 'ArrowUp') && selectedPath !== null) {
        e.preventDefault();
        const parts = selectedPath.split('.');
        const idx = parseInt(parts[parts.length - 1]);
        const parentPath = parts.slice(0, -1).join('.');
        const list = parentPath === '' ? todos : getByPath(parentPath).node.children;
        const newIdx = e.key === 'ArrowDown' ? idx + 1 : idx - 1;
        if (newIdx >= 0 && newIdx < list.length) {
          const [item] = list.splice(idx, 1);
          list.splice(newIdx, 0, item);
          // Update selectedPath to follow the moved item
          parts[parts.length - 1] = '' + newIdx;
          selectedPath = parts.join('.');
          saveTodos();
          render();
        }
        return;
      }

      // Arrow Down
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (currentIdx < 0) {
          selectedPath = visible[0].path;
        } else if (currentIdx < visible.length - 1) {
          selectedPath = visible[currentIdx + 1].path;
        } else {
          selectedPath = visible[0].path;
        }
        render();
        return;
      }

      // Arrow Up
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (currentIdx < 0) {
          selectedPath = visible[visible.length - 1].path;
        } else if (currentIdx > 0) {
          selectedPath = visible[currentIdx - 1].path;
        } else {
          selectedPath = visible[visible.length - 1].path;
        }
        render();
        return;
      }

      if (selectedPath === null) return;

      // Enter - toggle expand/collapse
      if (e.key === 'Enter' && !e.shiftKey && !e.metaKey) {
        e.preventDefault();
        const { node } = getByPath(selectedPath);
        if (node.children && node.children.length > 0) {
          toggleExpand(node.id);
        }
        return;
      }

      // Shift+Enter - complete
      if (e.key === 'Enter' && e.shiftKey) {
        e.preventDefault();
        toggleComplete(selectedPath);
        return;
      }

      // Cmd+Shift+= (plus) - add sub-todo
      if (e.key === '=' && e.metaKey && e.shiftKey) {
        e.preventDefault();
        const { node } = getByPath(selectedPath);
        startSubAdd(selectedPath, node.id);
        return;
      }

      // Shift+= (plus, no cmd) - add sibling todo below current
      if (e.key === '+' && e.shiftKey && !e.metaKey) {
        e.preventDefault();
        const parts = selectedPath.split('.');
        const isTopLevel = parts.length === 1;
        if (isTopLevel) {
          // Focus the main add bar
          document.getElementById('newTodo').focus();
        } else {
          // Open sub-add under the same parent
          const parentPath = parts.slice(0, -1).join('.');
          const parentNode = getByPath(parentPath).node;
          startSubAdd(parentPath, parentNode.id);
        }
        return;
      }

      // Delete/Backspace - remove
      if (e.key === 'Backspace' || e.key === 'Delete') {
        e.preventDefault();
        removeTodo(selectedPath);
        return;
      }

      // N - toggle notes
      if (e.key === 'n' || e.key === 'N') {
        e.preventDefault();
        openNotes(selectedPath);
        return;
      }

      // D - set due date (top-level only)
      if ((e.key === 'd' || e.key === 'D') || (e.key === 'C')) {
        e.preventDefault();
        promptDueDate(selectedPath);
        return;
      }

      // E - edit selected todo: move text to appropriate add bar
      if (e.key === 'e' || e.key === 'E') {
        e.preventDefault();
        const parts = selectedPath.split('.');
        const isTopLevel = parts.length === 1;
        const { node, list, idx } = getByPath(selectedPath);
        const text = node.text;
        list.splice(idx, 1);
        saveTodos();
        selectedPath = null;

        if (isTopLevel) {
          render();
          const input = document.getElementById('newTodo');
          input.value = text;
          input.focus();
          input.select();
        } else {
          // Sub-todo: open sub-add under parent
          const parentPath = parts.slice(0, -1).join('.');
          const parentNode = getByPath(parentPath).node;
          expandedIds.add(parentNode.id);
          render();
          startSubAdd(parentPath, parentNode.id);
          setTimeout(() => {
            const subInput = document.querySelector('.sub-add input');
            if (subInput) {
              subInput.value = text;
              subInput.focus();
              subInput.select();
            }
          }, 50);
        }
        return;
      }

      // Shift+Escape - archive completed sub-todo from active to completed tab
      if (e.key === 'Escape' && e.shiftKey && selectedPath.includes('.')) {
        const { node } = getByPath(selectedPath);
        if (node.completed) {
          e.preventDefault();
          // Find parent chain for context
          const parts = selectedPath.split('.');
          const parentPath = parts.slice(0, -1).join('.');
          let parentText = '';
          try {
            let p = getByPath(''+parts[0]).node;
            parentText = p.text;
            for (let i = 1; i < parts.length - 1; i++) {
              p = p.children[parseInt(parts[i])];
              parentText += ' > ' + p.text;
            }
          } catch {}
          // Add to completed with parent info and restore position
          const copy = deepCopy(node);
          copy.parent_text = parentText;
          if (!copy.completed_at) copy.completed_at = new Date().toISOString();
          const parentPathStr = parts.slice(0, -1).join('.');
          try {
            const parentNode = getByPath(parentPathStr).node;
            copy.original_parent_id = parentNode.id;
            copy.original_child_index = parseInt(parts[parts.length - 1]);
          } catch {}
          const existIdx = completed.findIndex(c => c.id === copy.id);
          if (existIdx >= 0) completed.splice(existIdx, 1);
          completed.unshift(copy);
          saveCompleted();
          // Remove from active
          removeTodo(selectedPath);
          return;
        }
      }

      // Escape - deselect, focus add bar
      if (e.key === 'Escape') {
        e.preventDefault();
        selectedPath = null;
        document.getElementById('newTodo').focus();
        render();
        return;
      }
    });

    document.getElementById('newTodo').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.metaKey) addTodo();
    });

    ipcRenderer.on('todos-changed', () => {
      load();
      render();
    });

    load();
    render();
  </script>
</body>
</html>
